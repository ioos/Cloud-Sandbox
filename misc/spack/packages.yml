packages:
  bison:
    externals:
    - spec: bison@3.0.4
      prefix: /usr
  cmake:
    externals:
    - spec: cmake@3.31.8
      prefix: /usr
    buildable: false
  mpi:
    externals:
    - spec: intel-oneapi-mpi@2023.1.0
      modules:
      - mpi/2023.1.0
      prefix: /save/intel/oneapi
  mkl:
    externals:
    - spec: intel-oneapi-mkl@2023.1.0
      modules:
      - mkl/2023.1.0
      prefix: /save/intel/oneapi
  all:
    compiler: [oneapi@2023.1.0]
    providers:
      mpi: [intel-oneapi-mpi@2023.1.0]
      blas: [intel-oneapi-mkl@2023.1.0]
      lapack: [intel-oneapi-mkl@2023.1.0]
      scalapack: [intel-oneapi-mkl@2023.1.0]
      